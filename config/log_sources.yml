# 日志源配置文件
# 定义各类日志的采集路径、格式和解析规则

log_sources:
  # VPN 登录日志
  - name: vpn_login
    type: file
    path: /var/log/vpn/*.log
    format: syslog
    fields:
      - timestamp
      - username
      - action
      - source_ip
      - status
    parser: regex
    pattern: "^(?P<timestamp>\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}) (?P<action>LOGIN|LOGOUT) user=(?P<username>\\w+) ip=(?P<source_ip>[\\d.]+) status=(?P<status>\\w+)"
    
  # OA 系统日志
  - name: oa_system
    type: file
    path: /var/log/oa/*.log
    format: custom
    fields:
      - timestamp
      - username
      - module
      - action
      - detail
    parser: regex
    pattern: "^(?P<timestamp>\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}) \\[(?P<module>\\w+)\\] user=(?P<username>\\w+) action=(?P<action>\\w+) (?P<detail>.*)"
    
  # Nginx 访问日志
  - name: nginx_access
    type: file
    path: /var/log/nginx/access.log
    format: nginx
    fields:
      - timestamp
      - remote_addr
      - method
      - uri
      - status
      - user_agent
    parser: nginx
    
  # API 调用日志
  - name: api_calls
    type: file
    path: /var/log/api/*.log
    format: json
    fields:
      - timestamp
      - user_id
      - endpoint
      - method
      - response_time
      - status_code
    parser: json
    
  # Windows 事件日志
  - name: windows_event
    type: windows_eventlog
    path: Application,System,Security
    format: windows_event
    parser: windows_eventlog
    
  # 安全设备日志
  - name: security_device
    type: syslog
    path: udp://514
    format: syslog
    fields:
      - timestamp
      - device_name
      - event_type
      - source_ip
      - destination_ip
      - action
    parser: regex
    pattern: "^(?P<timestamp>\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}) (?P<device_name>[\\w-]+) (?P<event_type>\\w+): src=(?P<source_ip>[\\d.]+) dst=(?P<destination_ip>[\\d.]+) action=(?P<action>\\w+)"

# 采集器配置
collector_config:
  filebeat:
    enabled: true
    config_path: config/filebeat.yml
    
  flume:
    enabled: false
    config_path: config/flume.conf
    
# Kafka 输出配置
kafka_output:
  bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
  topic: ${KAFKA_LOGS_TOPIC}
  compression_type: gzip
  batch_size: 100
  linger_ms: 100
